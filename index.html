<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷你游戏合集</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 迷你游戏合集</h1>
            <p>经典小游戏，随时随地玩耍</p>
            <button class="btn btn-primary" onclick="showReadme()">📖 显示说明</button>
        </header>

        <main>
            <div class="games-grid">
                <div class="game-card" onclick="window.location.href='games/snake.html'">
                    <div class="game-icon">🐍</div>
                    <h3>贪吃蛇</h3>
                    <p>经典贪吃蛇游戏，考验你的反应力</p>
                    <div class="game-meta">
                        <span class="difficulty">简单</span>
                        <span class="controls">键盘方向键</span>
                    </div>
                </div>

                <div class="game-card" onclick="window.location.href='games/brick.html'">
                    <div class="game-icon">🧱</div>
                    <h3>打砖块</h3>
                    <p>打掉所有砖块，不要让你的球掉下去</p>
                    <div class="game-meta">
                        <span class="difficulty">中等</span>
                        <span class="controls">键盘左右键</span>
                    </div>
                </div>

                <div class="game-card" onclick="window.location.href='games/tetris.html'">
                    <div class="game-icon">🔲</div>
                    <h3>俄罗斯方块</h3>
                    <p>经典的益智游戏，永远不会过时</p>
                    <div class="game-meta">
                        <span class="difficulty">中等</span>
                        <span class="controls">键盘方向键</span>
                    </div>
                </div>

                <div class="game-card" onclick="window.location.href='games/minesweeper.html'">
                    <div class="game-icon">💣</div>
                    <h3>扫雷</h3>
                    <p>经典扫雷游戏，考验你的逻辑推理能力</p>
                    <div class="game-meta">
                        <span class="difficulty">中等</span>
                        <span class="controls">鼠标左键/右键</span>
                    </div>
                </div>

                <div class="game-card" onclick="window.location.href='games/gomoku.html'">
                    <div class="game-icon">⚫</div>
                    <h3>五子棋</h3>
                    <p>经典五子棋游戏，人机对战，可选择难度</p>
                    <div class="game-meta">
                        <span class="difficulty">中等</span>
                        <span class="controls">鼠标点击</span>
                    </div>
                </div>
            </div>

            <div class="stats-section">
                <h2>🏆 排行榜</h2>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span>查看所有游戏的最高分和最后游玩时间</span>
                    <button class="btn btn-secondary" onclick="loadLeaderboard()">刷新排行榜</button>
                </div>
                <div id="leaderboard">
                    <div class="leaderboard-loading">加载中...</div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 迷你游戏合集 | 纯前端实现</p>
        </footer>
    </div>

    <!-- README 模态框 -->
    <div id="readme-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeReadme()">&times;</span>
            <h2>📖 游戏说明</h2>
            <div id="readme-content" class="readme-content">
                加载中...
            </div>
        </div>
    </div>

    <style>
        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
        }
        
        .readme-content {
            margin-top: 20px;
            line-height: 1.6;
        }
        
        .readme-content h2 {
            margin-top: 20px;
            margin-bottom: 10px;
        }
        
        .readme-content h3 {
            margin-top: 15px;
            margin-bottom: 8px;
        }
        
        .readme-content ul, .readme-content ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }
        
        .readme-content code {
            background-color: #f4f4f4;
            padding: 2px 4px;
            border-radius: 3px;
        }
        
        .readme-content pre {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 15px;
        }
    </style>

    <script src="js/storage.js"></script>
    <script src="js/cache-monitor.js"></script>
    <script>
        // 初始化缓存监控
        let cacheMonitor;
        if (typeof CacheMonitor !== 'undefined') {
            cacheMonitor = new CacheMonitor();
        }
    
        // 注册Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker 注册失败:', error);
                    });
            });
        }
    
        // 加载排行榜
        function loadLeaderboard() {
            const leaderboardHTML = `
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>游戏</th>
                            <th>最高分</th>
                            <th>最后游玩</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                    </tbody>
                </table>
            `;
            
            document.getElementById('leaderboard').innerHTML = leaderboardHTML;
            
            // 获取所有游戏的最高分
            const games = ['snake', 'brick', 'tetris', 'minesweeper', 'gomoku'];
            const tbody = document.getElementById('leaderboardBody');
            
            games.forEach(game => {
                const maxScore = localStorage.getItem(`game_${game}_maxScore`) || 0;
                const lastPlayed = localStorage.getItem(`game_${game}_lastPlayed`);
                
                let lastPlayedText = '从未游玩';
                if (lastPlayed) {
                    try {
                        const timestamp = parseInt(lastPlayed);
                        if (!isNaN(timestamp)) {
                            const date = new Date(timestamp);
                            if (!isNaN(date.getTime())) {
                                lastPlayedText = date.toLocaleDateString();
                            }
                        }
                    } catch (e) {
                        console.error('解析最后游玩时间失败:', e);
                    }
                }
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${getGameName(game)}</td>
                    <td>${maxScore}</td>
                    <td>${lastPlayedText}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function getGameName(game) {
            const names = {
                'snake': '🐍 贪吃蛇',
                'brick': '🧱 打砖块',
                'tetris': '🔲 俄罗斯方块',
                'minesweeper': '💣 扫雷',
                'gomoku': '⚫ 五子棋'
            };
            return names[game] || game;
        }
        
        // 页面加载完成后显示排行榜
        window.addEventListener('load', () => {
            // 清理过期数据
            if (typeof GameStorage !== 'undefined' && GameStorage.cleanupExpiredData) {
                GameStorage.cleanupExpiredData();
            }
            // 压缩存储数据
            if (typeof GameStorage !== 'undefined' && GameStorage.compressData) {
                GameStorage.compressData();
            }
            // 加载排行榜
            loadLeaderboard();
        });
        
        // 显示 README 模态框
        function showReadme() {
            const modal = document.getElementById('readme-modal');
            const content = document.getElementById('readme-content');
            
            modal.style.display = 'block';
            content.innerHTML = '加载中...';
            
            // 加载 README.md 文件
            fetch('README.md')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(text => {
                    // 简单的 Markdown 到 HTML 转换
                    const html = markdownToHtml(text);
                    content.innerHTML = html;
                })
                .catch(error => {
                    content.innerHTML = `<p>加载失败: ${error.message}</p><p>请直接查看项目根目录下的 README.md 文件。</p>`;
                    console.error('Error loading README:', error);
                });
        }
        
        // 关闭 README 模态框
        function closeReadme() {
            const modal = document.getElementById('readme-modal');
            modal.style.display = 'none';
        }
        
        // 简单的 Markdown 到 HTML 转换
        function markdownToHtml(markdown) {
            return markdown
                .replace(/^# (.*$)/gim, '<h2>$1</h2>')
                .replace(/^## (.*$)/gim, '<h3>$1</h3>')
                .replace(/^### (.*$)/gim, '<h4>$1</h4>')
                .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/gim, '<em>$1</em>')
                .replace(/`(.*?)`/gim, '<code>$1</code>')
                .replace(/```([\s\S]*?)```/gim, '<pre>$1</pre>')
                .replace(/^- (.*$)/gim, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ol>$1</ol>')
                .replace(/^\s*$\n/gim, '<br>');
        }
        
        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('readme-modal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
