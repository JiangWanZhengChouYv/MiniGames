<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏 - 迷你游戏合集</title>
    <link rel="stylesheet" href="../css/games.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🐍 贪吃蛇游戏</h1>
            <p>经典贪吃蛇，考验你的反应力！</p>
        </header>

        <div class="game-info">
            <div class="info-panel">
                <h3>当前得分</h3>
                <div class="value" id="currentScore">0</div>
            </div>
            <div class="info-panel">
                <h3>最高分</h3>
                <div class="value" id="maxScore">0</div>
            </div>
            <div class="info-panel">
                <h3>长度</h3>
                <div class="value" id="snakeLength">1</div>
            </div>
        </div>

        <div class="instructions">
            <h3>🎮 游戏说明</h3>
            <ul>
                <li><kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> - 控制蛇的移动方向</li>
                <li>吃到红色食物得分+10，蛇身变长</li>
                <li>避免撞墙或撞到自己</li>
                <li>游戏结束后按空格键重新开始</li>
            </ul>
        </div>

        <div class="game-board">
            <canvas id="gameCanvas" class="game-canvas" width="400" height="400"></canvas>
        </div>

        <div class="game-controls">
            <button class="btn btn-primary" id="startBtn">开始游戏</button>
            <button class="btn btn-secondary" id="pauseBtn">暂停</button>
            <button class="btn btn-danger" id="resetBtn">重新开始</button>
            <button class="btn btn-secondary" onclick="window.location.href='../index.html'">返回首页</button>
        </div>
    </div>

    <div class="game-overlay" id="gameOverlay">
        <div class="game-over">
            <h2>游戏结束！</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <p>蛇的长度: <span id="finalLength">1</span></p>
            <button class="btn btn-primary" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/snake.js"></script>
</body>
</html>
