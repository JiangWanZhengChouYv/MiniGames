<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块 - 迷你游戏合集</title>
    <link rel="stylesheet" href="../css/games.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🧱 打砖块</h1>
            <p>经典打砖块游戏，考验你的反应能力！</p>
        </header>

        <div class="game-info">
            <div class="info-panel">
                <h3>当前得分</h3>
                <div class="value" id="currentScore">0</div>
            </div>
            <div class="info-panel">
                <h3>最高分</h3>
                <div class="value" id="maxScore">0</div>
            </div>
            <div class="info-panel">
                <h3>关卡</h3>
                <div class="value" id="level">1</div>
            </div>
            <div class="info-panel">
                <h3>剩余球数</h3>
                <div class="value" id="balls">3</div>
            </div>
        </div>

        <div class="instructions">
            <h3>🎮 游戏说明</h3>
            <ul>
                <li><kbd>←</kbd> <kbd>→</kbd> - 左右移动挡板</li>
                <li>球碰到砖块得分，所有砖块消失过关</li>
                <li>球掉落则失去一个球，球数为0游戏结束</li>
                <li>每关砖块布局不同，难度递增</li>
            </ul>
        </div>

        <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
            <div class="game-board">
                <canvas id="gameCanvas" class="game-canvas" width="500" height="500"></canvas>
            </div>
            <div class="info-panel" style="text-align: left; width: 200px;">
                <h3>下一关预览</h3>
                <canvas id="nextLevelCanvas" width="150" height="150"></canvas>
                <div style="margin-top: 15px;">
                    <h4>当前关卡特色</h4>
                    <p id="levelFeature">标准砖块布局</p>
                </div>
            </div>
        </div>

        <div class="game-controls">
            <button class="btn btn-primary" id="startBtn">开始游戏</button>
            <button class="btn btn-secondary" id="pauseBtn">暂停</button>
            <button class="btn btn-danger" id="resetBtn">重新开始</button>
            <button class="btn btn-secondary" onclick="window.location.href='../index.html'">返回首页</button>
        </div>
    </div>

    <div class="game-overlay" id="gameOverlay">
        <div class="game-over">
            <h2 id="gameOverTitle">游戏结束！</h2>
            <p id="gameOverMessage">最终得分: <span id="finalScore">0</span></p>
            <p>通过关卡: <span id="finalLevel">0</span></p>
            <button class="btn btn-primary" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/brick.js"></script>
</body>
</html>
