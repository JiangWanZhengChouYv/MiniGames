<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - 迷你游戏合集</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .game-container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        
        .controls {
            margin-bottom: 20px;
        }
        
        .difficulty-buttons {
            margin-bottom: 15px;
        }
        
        .difficulty-buttons button {
            margin: 0 5px;
            padding: 8px 16px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
            cursor: pointer;
        }
        
        .difficulty-buttons button.active {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        
        .restart-button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .restart-button:hover {
            background-color: #0b7dda;
        }
        
        .board-container {
            margin: 20px auto;
            position: relative;
        }
        
        #board {
            border-collapse: collapse;
            margin: 0 auto;
        }
        
        #board td {
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            position: relative;
        }
        
        #board td:hover {
            background-color: #f0f0f0;
        }
        
        .piece {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin: 0 auto;
        }
        
        .piece.black {
            background-color: black;
        }
        
        .piece.white {
            background-color: white;
            border: 1px solid black;
        }
        
        .status {
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
        }
        
        .return-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #9e9e9e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .return-button:hover {
            background-color: #757575;
        }
    </style>
</head>
<body>
    <h1>五子棋</h1>
    
    <div class="game-container">
        <div class="controls">
            <div class="difficulty-buttons">
                <button id="easy" class="active">简单</button>
                <button id="medium">中等</button>
                <button id="hard">困难</button>
            </div>
            <button class="restart-button" id="restart">重新开始</button>
        </div>
        
        <div class="board-container">
            <table id="board"></table>
        </div>
        
        <div class="status" id="status">准备开始 - 请选择难度</div>
        
        <a href="../index.html" class="return-button">返回首页</a>
    </div>
    
    <script src="../js/storage.js"></script>
    <script src="../js/gomoku.js"></script>
</body>
</html>
