<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - 迷你游戏合集</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .game-container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        
        .controls {
            margin-bottom: 20px;
        }
        
        .restart-button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .restart-button:hover {
            background-color: #0b7dda;
        }
        
        .board-container {
            margin: 20px auto;
            position: relative;
        }
        
        #board {
            border-collapse: collapse;
            margin: 0 auto;
        }
        
        #board td {
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            position: relative;
        }
        
        #board td:hover {
            background-color: #f0f0f0;
        }
        
        .piece {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin: 0 auto;
        }
        
        .piece.black {
            background-color: black;
        }
        
        .piece.white {
            background-color: white;
            border: 1px solid black;
        }
        
        .status {
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
        }
        
        .return-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #9e9e9e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .return-button:hover {
            background-color: #757575;
        }
        
        /* AI对话区域样式 */
        .ai-dialog-container {
            display: flex;
            align-items: flex-start;
            margin: 15px 0;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 15px;
            min-height: 60px;
        }
        
        .ai-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        
        .ai-avatar::before {
            content: "🤖";
            font-size: 28px;
        }
        
        .ai-dialog-wrapper {
            flex: 1;
            position: relative;
        }
        
        .ai-dialog-bubble {
            background-color: white;
            border-radius: 18px;
            padding: 12px 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            border: 1px solid #e0e0e0;
            animation: fadeIn 0.3s ease-in-out;
        }
        
        .ai-dialog-bubble::before {
            content: "";
            position: absolute;
            left: -10px;
            top: 15px;
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 10px solid white;
        }
        
        .ai-dialog-bubble::after {
            content: "";
            position: absolute;
            left: -11px;
            top: 15px;
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 10px solid #e0e0e0;
            z-index: -1;
        }
        
        .ai-dialog-text {
            color: #333;
            font-size: 15px;
            line-height: 1.5;
            margin: 0;
        }
        
        .ai-name {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .typing-indicator {
            display: none;
            align-items: center;
            padding: 8px 0;
        }
        
        .typing-indicator.active {
            display: flex;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: #999;
            border-radius: 50%;
            margin: 0 3px;
            animation: typing 1.4s infinite ease-in-out both;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* 训练控制面板样式 */
        .training-controls {
            margin-top: 15px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }
        
        .training-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        .training-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        
        .train-ai-button {
            padding: 8px 16px;
            font-size: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        
        .train-ai-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .train-ai-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        #training-panel {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        #training-panel.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }
        
        .progress-container {
            margin-bottom: 15px;
        }
        
        .progress-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        
        .progress-bar {
            width: 100%;
            height: 12px;
            background-color: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px;
            transition: width 0.3s ease;
            position: relative;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 100%
            );
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        #training-status {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            padding: 8px;
            background-color: #f0f0f0;
            border-radius: 4px;
            text-align: center;
        }
        
        .training-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .training-details {
            margin-bottom: 15px;
            padding: 12px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        .training-details h4 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }
        
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .detail-item:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: #666;
            font-size: 13px;
        }
        
        .detail-value {
            color: #333;
            font-weight: bold;
            font-size: 13px;
        }
        
        .stat-item {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }
        
        .cancel-training-btn {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .cancel-training-btn:hover {
            background-color: #ff5252;
        }
        
        .storage-info {
            margin-top: 15px;
            padding: 12px;
            background-color: #e3f2fd;
            border-radius: 8px;
            border-left: 4px solid #2196F3;
        }
        
        .storage-header {
            font-size: 14px;
            font-weight: bold;
            color: #1976D2;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .storage-header::before {
            content: '💾';
        }
        
        .storage-bar {
            width: 100%;
            height: 8px;
            background-color: #bbdefb;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        
        .storage-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50 0%, #8BC34A 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .storage-fill.warning {
            background: linear-gradient(90deg, #FF9800 0%, #FFC107 100%);
        }
        
        .storage-fill.danger {
            background: linear-gradient(90deg, #f44336 0%, #FF5722 100%);
        }
        
        .storage-text {
            font-size: 12px;
            color: #666;
            text-align: right;
        }
        
        .cleanup-btn {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 13px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .cleanup-btn:hover {
            background-color: #f57c00;
        }
        
        .cleanup-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        /* 训练结果弹窗 */
        .training-result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .training-result-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-in-out;
        }
        
        .training-result-content {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease-in-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .training-result-title {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .training-result-summary {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-label {
            color: #666;
            font-size: 14px;
        }
        
        .result-value {
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }
        
        .close-result-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .close-result-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <h1>五子棋</h1>
    
    <div class="game-container">
        <div class="controls">
            <button class="restart-button" id="restart">重新开始</button>
        </div>
        
        <!-- AI对话区域 -->
        <div class="ai-dialog-container" id="ai-dialog-container">
            <div class="ai-avatar"></div>
            <div class="ai-dialog-wrapper">
                <div class="ai-name">AI对手</div>
                <div class="ai-dialog-bubble" id="ai-dialog">
                    <p class="ai-dialog-text" id="ai-dialog-text">你好！我是你的五子棋对手 🤖 点击棋盘任意位置开始游戏吧！</p>
                    <div class="typing-indicator" id="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="board-container">
            <table id="board"></table>
        </div>
        
        <div class="status" id="status">准备开始 - 点击任意处开始游戏</div>
        
        <!-- 训练控制面板 -->
        <div class="training-controls">
            <div class="training-header">
                <span class="training-title">🤖 AI 训练中心</span>
                <div class="button-group">
                    <button class="train-ai-button" id="train-ai-btn">开始训练</button>
                    <button class="train-ai-button" id="auto-learn-btn" style="background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 100%); margin-left: 10px;">自动学习</button>
                </div>
            </div>
            
            <!-- 训练状态面板 -->
            <div id="training-panel">
                <div class="progress-container">
                    <div class="progress-label">
                        <span>训练进度</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="training-progress" style="width: 0%"></div>
                    </div>
                </div>
                
                <div id="training-status">准备开始训练...</div>
                
                <div class="training-stats" id="training-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="stat-games">0</div>
                        <div class="stat-label">已完成对局</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-patterns">0</div>
                        <div class="stat-label">当前对局</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-black-wins">0</div>
                        <div class="stat-label">黑子胜</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-white-wins">0</div>
                        <div class="stat-label">白子胜</div>
                    </div>
                </div>
                
                <div class="training-details">
                    <h4>训练详情</h4>
                    <div class="detail-item">
                        <span class="detail-label">总对局数:</span>
                        <span class="detail-value" id="detail-total-games">50</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">平均步数:</span>
                        <span class="detail-value" id="detail-avg-moves">0</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">平均时长:</span>
                        <span class="detail-value" id="detail-avg-duration">0s</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">总耗时:</span>
                        <span class="detail-value" id="detail-total-duration">0s</span>
                    </div>
                </div>
                
                <button class="cancel-training-btn" id="cancel-training-btn">取消训练</button>
            </div>
            
            <!-- 存储空间信息 -->
            <div class="storage-info" id="storage-info">
                <div class="storage-header">存储空间</div>
                <div class="storage-bar">
                    <div class="storage-fill" id="storage-fill" style="width: 0%"></div>
                </div>
                <div class="storage-text" id="storage-text">0 MB / 100 MB</div>
                <button class="cleanup-btn" id="cleanup-btn">清理旧数据</button>
            </div>
        </div>
        
        <a href="../index.html" class="return-button">返回首页</a>
    </div>
    
    <!-- 训练结果弹窗 -->
    <div class="training-result-modal" id="training-result-modal">
        <div class="training-result-content">
            <div class="training-result-title">🎉 训练完成</div>
            <div class="training-result-summary" id="training-result-summary">
                <!-- 动态填充结果内容 -->
            </div>
            <button class="close-result-btn" id="close-result-btn">确定</button>
        </div>
    </div>
    
    <script src="../js/storage.js"></script>
    <script src="../js/gomoku.js"></script>
</body>
</html>
