<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 迷你游戏合集</title>
    <link rel="stylesheet" href="../css/games.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🔲 俄罗斯方块</h1>
            <p>经典益智游戏，永远不会过时！</p>
        </header>

        <div class="game-info">
            <div class="info-panel">
                <h3>当前得分</h3>
                <div class="value" id="currentScore">0</div>
            </div>
            <div class="info-panel">
                <h3>最高分</h3>
                <div class="value" id="maxScore">0</div>
            </div>
            <div class="info-panel">
                <h3>等级</h3>
                <div class="value" id="level">1</div>
            </div>
            <div class="info-panel">
                <h3>消除行数</h3>
                <div class="value" id="lines">0</div>
            </div>
        </div>

        <div class="instructions">
            <h3>🎮 游戏说明</h3>
            <ul>
                <li><kbd>←</kbd> <kbd>→</kbd> - 左右移动方块</li>
                <li><kbd>↑</kbd> - 旋转方块</li>
                <li><kbd>↓</kbd> - 加速下落</li>
                <li><kbd>空格键</kbd> - 直接落到底部</li>
                <li>消除一行得100分，两行得300分，三行得500分，四行得800分</li>
            </ul>
        </div>

        <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
            <div class="game-board">
                <canvas id="gameCanvas" class="game-canvas" width="400" height="800"></canvas>
            </div>
            <div class="info-panel" style="text-align: left; width: 150px;">
                <h3>下一个方块</h3>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>
        </div>

        <div class="game-controls">
            <button class="btn btn-primary" id="startBtn">开始游戏</button>
            <button class="btn btn-secondary" id="pauseBtn">暂停</button>
            <button class="btn btn-danger" id="resetBtn">重新开始</button>
            <button class="btn btn-secondary" onclick="window.location.href='../index.html'">返回首页</button>
        </div>
    </div>

    <div class="game-overlay" id="gameOverlay">
        <div class="game-over">
            <h2>游戏结束！</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <p>消除行数: <span id="finalLines">0</span></p>
            <button class="btn btn-primary" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/cache-monitor.js"></script>
    <script>
        // 初始化缓存监控
        let cacheMonitor;
        if (typeof CacheMonitor !== 'undefined') {
            cacheMonitor = new CacheMonitor();
        }
        
        // 注册Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker 注册失败:', error);
                    });
            });
        }
    </script>
    <script src="../js/tetris.js"></script>
</body>
</html>
